<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">



</head>

<body>
    <div class="main" id="main"></div>
    <div class="player">
        <div class="row1" id="row1"></div>
        <div class="songTitle" id="songTitle">Title</div>

        <div class="row2">
            <div class="play">
                <img src="images/previous.png" id="pre" alt="" onclick="pre()">
                <img src="images/play-button-arrowhead.png" id="play" alt="" onclick = "playOrPauseSong()">
                <img src="images/next.png" id="next" alt="" onclick="next()">
            </div>

                <div class="seek-bar ">
                    <div class="handle">
                        <div id="fill"></div>
                    </div>
                </div>
                <div class="mute">
                    <div id="currentTime">00:00</div>
                    <div class="muteButtons">
                        <img src="images/volume-down.png" id="decrease" alt="">
                        <img src="images/volume.png" id="mute" alt="" onclick="muted()">
                        <img src="images/increase-volume.png" id="increase" alt="">
                    </div>
                </div>


        </div>
        <script src="audio.js"></script>
</body>

</html>
